site_name: Codex ecosystem hub
site_description: Central hub for Codex libraries, updates, and developer references
site_author: Codex Team
site_url: https://codexdlc.github.io/codex-docs/

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - include-markdown

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/home.js

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Home: index.md
  - Libraries:
      - Overview: libraries/index.md
      - codex-core: libraries/codex-core.md
      - codex-platform: libraries/codex-platform.md
      - codex-ai: libraries/codex-ai.md
      - codex-services: libraries/codex-services.md
      - codex-django: libraries/codex-django.md
      - codex-django-cli: libraries/codex-django-cli.md
      - codex-bot: libraries/codex-bot.md
  - Updates: updates.md
  - Developers: developers.md
